<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Add Candidate — RecruitX</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{--primary:#7c3aed;--primary-dark:#6d28d9;--border:#e2e8f0;--muted:#64748b;--bg:#f8fafc;}
  *{box-sizing:border-box;}
  body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);margin:0;display:flex;flex-direction:column;min-height:100vh;}
  /* Sidebar */
  .sidebar{width:220px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;position:fixed;top:0;left:0;height:100vh;z-index:10;}
  .sidebar-logo{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px;}
  .sidebar-logo span{font-size:20px;font-weight:800;color:var(--primary);}
  .sidebar-role{display:inline-block;background:#ede9fe;color:var(--primary);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:4px;}
  .nav-link{display:flex;align-items:center;gap:10px;padding:11px 20px;font-size:14px;font-weight:600;color:var(--muted);text-decoration:none;border-left:3px solid transparent;transition:all .15s;}
  .nav-link:hover{background:#f5f3ff;color:var(--primary);}
  .nav-link.active{background:#f5f3ff;color:var(--primary);border-left-color:var(--primary);}
  .nav-icon{width:18px;text-align:center;}
  .sidebar-bottom{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);}
  .user-name{font-size:13px;font-weight:600;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .user-email{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  /* Main */
  .main{margin-left:220px;padding:32px;flex:1;}
  /* Card */
  .card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:28px;}
  /* Form */
  label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:5px;}
  input,select,textarea{width:100%;padding:10px 13px;font-size:14px;border:1px solid var(--border);border-radius:8px;outline:none;transition:border .15s;background:#fff;}
  input:focus,select:focus,textarea:focus{border-color:var(--primary);}
  .form-row{margin-bottom:16px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  /* Buttons */
  .btn{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:background .15s;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-danger{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;padding:6px 13px;font-size:13px;border-radius:6px;cursor:pointer;}
  /* Alert */
  .alert{padding:11px 14px;border-radius:8px;font-size:14px;margin-bottom:14px;display:none;}
  .alert.show{display:block;}
  .alert.success{background:#f0fdf4;color:#16a34a;}
  .alert.error{background:#fef2f2;color:#dc2626;}
  .alert.info{background:#eff6ff;color:#1d4ed8;}
  /* Table */
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;padding:10px 13px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);background:var(--bg);border-bottom:2px solid var(--border);}
  td{padding:13px;font-size:14px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
  tr:hover td{background:#fafafe;}
  /* Badge */
  .badge{display:inline-block;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:700;}
  .b-gray{background:#f1f5f9;color:var(--muted);}
  .b-blue{background:#eff6ff;color:#1d4ed8;}
  .b-orange{background:#fff7ed;color:#c2410c;}
  .b-red{background:#fef2f2;color:#dc2626;}
  .b-green{background:#f0fdf4;color:#16a34a;}
  .b-yellow{background:#fefce8;color:#854d0e;}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div><span>RecruitX</span></div>
    <div class="sidebar-role">Recruiter</div>
  </div>
  <a href="/recruiter/add"        class="nav-link active"><span class="nav-icon">👤</span> Add Candidate</a>
  <a href="/recruiter/schedule"   class="nav-link"><span class="nav-icon">📅</span> Schedule Interview</a>
  <a href="/recruiter/scorecards" class="nav-link"><span class="nav-icon">📊</span> Scorecards</a>
  <a href="/recruiter/prompts"    class="nav-link"><span class="nav-icon">✨</span> Generate Prompt</a>
  <div class="sidebar-bottom">
    <div class="user-name" id="user-name"></div>
    <div class="user-email" id="user-email"></div>
    <button onclick="logout()" style="margin-top:10px;background:#f1f5f9;border:none;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;width:100%;">Logout</button>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <h1 style="font-size:22px;font-weight:800;color:#0f172a;margin:0 0 24px;">Add Candidate</h1>

  <div style="display:grid;grid-template-columns:400px 1fr;gap:24px;align-items:start;">

    <!-- Add form -->
    <div class="card">
      <h2 style="font-size:16px;font-weight:700;color:#374151;margin:0 0 20px;">New Candidate Details</h2>
      <form id="add-form" onsubmit="submitAdd(event)">
        <div class="form-grid">
          <div class="form-row">
            <label>Full Name *</label>
            <input id="f-name" type="text" placeholder="Jane Doe" required>
          </div>
          <div class="form-row">
            <label>Email Address *</label>
            <input id="f-email" type="email" placeholder="jane@example.com" required>
          </div>
          <div class="form-row">
            <label>Phone Number</label>
            <input id="f-phone" type="text" placeholder="+91 98765 43210">
          </div>
          <div class="form-row">
            <label>Role Applied For</label>
            <input id="f-role" type="text" placeholder="e.g. Full Stack Developer">
          </div>
        </div>
        <div class="form-row">
          <label>Notes</label>
          <textarea id="f-notes" rows="2" placeholder="Any relevant context..."></textarea>
        </div>
        <div id="add-alert" class="alert"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="add-btn">Add Candidate</button>
      </form>
    </div>

    <!-- Candidates list -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 style="font-size:16px;font-weight:700;color:#374151;margin:0;">My Candidates</h2>
        <span id="total-count" style="font-size:13px;color:var(--muted);"></span>
      </div>
      <table>
        <thead><tr>
          <th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Attempts</th><th></th>
        </tr></thead>
        <tbody id="list-tbody">
          <tr><td colspan="6" style="text-align:center;color:var(--muted);padding:32px;">Loading...</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<script>
const API = '';
const token = localStorage.getItem('token') || '';
const user  = JSON.parse(localStorage.getItem('user') || '{}');

async function boot() {
  if (!token) { location.href='/login'; return; }
  if (user.role === 'admin') { location.href='/admin'; return; }
  try {
    const r = await fetch(`${API}/api/auth/me`, {headers:{Authorization:`Bearer ${token}`}});
    if (!r.ok) { logout(); return; }
    const d = await r.json();
    if (d.user?.role === 'admin') { location.href='/admin'; return; }
  } catch { logout(); return; }
  document.getElementById('user-name').textContent  = user.name  || '';
  document.getElementById('user-email').textContent = user.email || '';
  loadCandidates();
}

function logout() {
  localStorage.removeItem('token'); localStorage.removeItem('user');
  location.href='/login';
}

async function loadCandidates() {
  const r = await fetch(`${API}/api/candidates`, {headers:{Authorization:`Bearer ${token}`}});
  const d = await r.json();
  renderList(d.candidates || []);
}

function renderList(list) {
  document.getElementById('total-count').textContent = `${list.length} total`;
  const tbody = document.getElementById('list-tbody');
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:32px;">No candidates yet.</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(c => `
    <tr>
      <td><strong>${esc(c.name)}</strong></td>
      <td style="color:var(--muted);font-size:13px;">${esc(c.email)}</td>
      <td>${esc(c.roleName||'—')}</td>
      <td>${badge(c)}</td>
      <td style="text-align:center;">${c.attemptCount||0}/2</td>
      <td><button class="btn-danger" onclick="del('${c._id}','${esc(c.name)}')">Delete</button></td>
    </tr>`).join('');
}

function badge(c) {
  const s = c.interviewStatus || 'never_invited';
  const m = {never_invited:['b-gray','Not Invited'],attempt_1_scheduled:['b-blue','Interview 1 Sched.'],
    cooldown:['b-orange',coolDays(c)],attempt_2_scheduled:['b-blue','Interview 2 Sched.'],
    locked:['b-red','Final/Locked'],completed:['b-green','Completed'],partial:['b-yellow','Partial'],no_show:['b-orange','No Show']};
  const [cls,label] = m[s]||['b-gray',s];
  return `<span class="badge ${cls}">${label}</span>`;
}
function coolDays(c) {
  if (!c.cooldownUntil) return 'Cooldown';
  const d = Math.max(0, Math.ceil((c.cooldownUntil - Date.now())/86400000));
  return `Cooldown (${d}d)`;
}

async function submitAdd(e) {
  e.preventDefault();
  const btn = document.getElementById('add-btn');
  btn.disabled = true;
  alert2('add-alert','info','Adding candidate...');
  try {
    const r = await fetch(`${API}/api/candidates`,{
      method:'POST', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
      body: JSON.stringify({
        name:      document.getElementById('f-name').value.trim(),
        email:     document.getElementById('f-email').value.trim(),
        phone:     document.getElementById('f-phone').value.trim(),
        notes:     document.getElementById('f-notes').value.trim(),
        role_name: document.getElementById('f-role').value.trim(),
      })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail||'Failed');
    alert2('add-alert','success',`${d.name} added successfully.`);
    e.target.reset();
    loadCandidates();
  } catch(err) { alert2('add-alert','error',err.message); }
  finally { btn.disabled = false; }
}

async function del(id, name) {
  if (!confirm(`Delete ${name}?`)) return;
  const r = await fetch(`${API}/api/candidates/${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});
  if (r.ok) loadCandidates();
  else alert('Failed to delete');
}

function alert2(id, type, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = `alert show ${type}`;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

boot();
</script>
</body>
</html>
