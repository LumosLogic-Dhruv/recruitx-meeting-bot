<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign up for Lumos AI Interviewer Hub" />
  <title>Sign Up - Lumos AI Interviewer</title>
  <link rel="icon" type="image/svg+xml" href="/static/LogoWithoutName.svg" />
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      corePlugins: {
        preflight: false,
      }
    }
  </script>
  
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --card-hover: #f1f5f9;
      --border: #e2e8f0;
      --border-focus: #8b5cf6;
      --text: #0f172a;
      --text-muted: #64748b;
      --primary: #8b5cf6;
      --primary-hover: #7c3aed;
      --success: #10b981;
      --error: #ef4444;
      --warning: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100vw;
      background: radial-gradient(circle at top right, rgba(139, 92, 246, 0.08), transparent 40%),
                  radial-gradient(circle at bottom left, rgba(76, 29, 149, 0.06), transparent 45%),
                  #f8fafc;
      padding: 20px;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05), 0 0 20px rgba(139, 92, 246, 0.02);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo {
      display: inline-flex;
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
    }

    .auth-header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 8px;
    }

    .auth-header p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 1px var(--border-focus);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s, background-color 0.2s;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      color: #fff;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
    }
    .btn-primary:hover {
      opacity: 0.95;
    }

    .status-alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.5;
      margin-top: 16px;
      display: none;
    }
    .status-alert.show { display: block; }
    .status-alert.success { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); color: #065f46; }
    .status-alert.error { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--error); color: #991b1b; }
    .status-alert.info { background: rgba(139, 92, 246, 0.1); border: 1px solid var(--primary); color: #6b21a8; }

    .auth-footer-link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .auth-footer-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <a href="/">
          <img src="/static/LogoWithoutName.svg" alt="Lumos Logo" class="auth-logo" style="object-fit: contain;" />
        </a>
        <h1>Create an Account</h1>
        <p>Get started with Lumos AI Interviewer</p>
      </div>

      <form id="signup-form" onsubmit="handleSignupSubmit(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signup-name" required placeholder="John Doe" />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="signup-email" required placeholder="name@company.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" required placeholder="••••••••" />
        </div>
        
        <button class="btn btn-primary" style="width:100%; margin-top: 10px;" type="submit" id="btn-signup-submit">Sign Up</button>
      </form>

      <div id="auth-status" class="status-alert"></div>

      <div class="auth-footer-link">
        Already have an account? <a href="/login">Sign In</a>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let token = localStorage.getItem('token') || '';

    // If already logged in, redirect straight to dashboard
    document.addEventListener("DOMContentLoaded", async () => {
      if (token) {
        const ok = await checkSession();
        if (ok) {
          window.location.href = '/dashboard';
        }
      }
    });

    async function checkSession() {
      try {
        const res = await fetch(`${API}/api/auth/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        return res.ok;
      } catch (_) {}
      return false;
    }

    async function handleSignupSubmit(e) {
      e.preventDefault();
      const statusEl = document.getElementById('auth-status');
      statusEl.classList.remove('show');
      
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;

      const btn = document.getElementById('btn-signup-submit');
      btn.disabled = true;
      
      try {
        const res = await fetch(`${API}/api/auth/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Sign up failed');
        
        statusEl.textContent = 'Account created successfully! Logging you in...';
        statusEl.className = 'status-alert show success';
        
        // Auto Login
        const loginRes = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const loginData = await loginRes.json();
        if (!loginRes.ok) throw new Error(loginData.detail || 'Auto-login failed');
        
        localStorage.setItem('token', loginData.token);
        localStorage.setItem('user', JSON.stringify(loginData.user));
        
        setTimeout(() => {
          window.location.href = '/dashboard';
        }, 800);
      } catch (err) {
        statusEl.textContent = err.message;
        statusEl.className = 'status-alert show error';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
