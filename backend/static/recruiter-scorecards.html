<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scorecards — RecruitX</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{--primary:#7c3aed;--primary-dark:#6d28d9;--border:#e2e8f0;--muted:#64748b;--bg:#f8fafc;}
  *{box-sizing:border-box;}
  body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);margin:0;display:flex;min-height:100vh;}
  .sidebar{width:220px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;position:fixed;top:0;left:0;height:100vh;z-index:10;}
  .sidebar-logo{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px;}
  .sidebar-logo span{font-size:20px;font-weight:800;color:var(--primary);}
  .sidebar-role{display:inline-block;background:#ede9fe;color:var(--primary);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:4px;}
  .nav-link{display:flex;align-items:center;gap:10px;padding:11px 20px;font-size:14px;font-weight:600;color:var(--muted);text-decoration:none;border-left:3px solid transparent;transition:all .15s;}
  .nav-link:hover{background:#f5f3ff;color:var(--primary);}
  .nav-link.active{background:#f5f3ff;color:var(--primary);border-left-color:var(--primary);}
  .nav-icon{width:18px;text-align:center;}
  .sidebar-bottom{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);}
  .main{margin-left:220px;padding:32px;flex:1;}
  .card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:28px;}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;padding:10px 13px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);background:var(--bg);border-bottom:2px solid var(--border);}
  td{padding:13px;font-size:14px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
  tr:hover td{background:#fafafe;}
  .badge{display:inline-block;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:700;}
  .b-gray{background:#f1f5f9;color:var(--muted);}
  .b-blue{background:#eff6ff;color:#1d4ed8;}
  .b-orange{background:#fff7ed;color:#c2410c;}
  .b-red{background:#fef2f2;color:#dc2626;}
  .b-green{background:#f0fdf4;color:#16a34a;}
  .b-yellow{background:#fefce8;color:#854d0e;}
  .score-chip{display:inline-block;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;color:#fff;}
  .btn-sm{padding:6px 13px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;}
  .btn-outline{background:#f5f3ff;color:var(--primary);border:1px solid #ddd6fe;}
  .btn-outline:hover{background:#ede9fe;}
  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center;}
  .overlay.open{display:flex;}
  .modal{background:#fff;border-radius:16px;width:92%;max-width:740px;max-height:88vh;overflow-y:auto;padding:32px;}
  /* Attempt tab buttons */
  .atab{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:#f1f5f9;color:#374151;}
  .atab.active{background:var(--primary);color:#fff;}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div><span>RecruitX</span></div>
    <div class="sidebar-role">Recruiter</div>
  </div>
  <a href="/recruiter/add"        class="nav-link"><span class="nav-icon">👤</span> Add Candidate</a>
  <a href="/recruiter/schedule"   class="nav-link"><span class="nav-icon">📅</span> Schedule Interview</a>
  <a href="/recruiter/scorecards" class="nav-link active"><span class="nav-icon">📊</span> Scorecards</a>
  <a href="/recruiter/prompts"    class="nav-link"><span class="nav-icon">✨</span> Generate Prompt</a>
  <div class="sidebar-bottom">
    <div style="font-size:13px;font-weight:600;color:#374151;" id="user-name"></div>
    <div style="font-size:11px;color:var(--muted);" id="user-email"></div>
    <button onclick="logout()" style="margin-top:10px;background:#f1f5f9;border:none;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;width:100%;">Logout</button>
  </div>
</aside>

<div class="main">
  <h1 style="font-size:22px;font-weight:800;color:#0f172a;margin:0 0 24px;">Candidate Scorecards</h1>

  <!-- Stats row -->
  <div id="stats-row" style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;"></div>

  <div class="card">
    <table>
      <thead><tr>
        <th>Candidate</th><th>Role</th><th>Attempts</th><th>Best Score</th><th>Recommendation</th><th>Status</th><th>Scorecards</th>
      </tr></thead>
      <tbody id="sc-tbody">
        <tr><td colspan="7" style="text-align:center;color:var(--muted);padding:40px;">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Scorecard Modal -->
<div class="overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <h3 id="modal-title" style="font-size:18px;font-weight:800;color:#0f172a;margin:0;"></h3>
      <button onclick="closeModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:var(--muted);line-height:1;">✕</button>
    </div>
    <!-- Attempt tabs -->
    <div id="modal-tabs" style="display:flex;gap:8px;margin-bottom:20px;"></div>
    <div id="modal-body"><p style="color:var(--muted);text-align:center;padding:40px;">Loading...</p></div>
  </div>
</div>

<script>
const API = '';
const token = localStorage.getItem('token') || '';
const user  = JSON.parse(localStorage.getItem('user') || '{}');
let allCandidates = [];
let allMeetings   = [];
let currentMeetings = [];

async function boot() {
  if (!token) { location.href='/login'; return; }
  if (user.role === 'admin') { location.href='/admin'; return; }
  try {
    const r = await fetch(`${API}/api/auth/me`,{headers:{Authorization:`Bearer ${token}`}});
    if (!r.ok) { logout(); return; }
    const d = await r.json();
    if (d.user?.role === 'admin') { location.href='/admin'; return; }
  } catch { logout(); return; }
  document.getElementById('user-name').textContent  = user.name  || '';
  document.getElementById('user-email').textContent = user.email || '';
  await Promise.all([loadCandidates(), loadMeetings()]);
  renderStats();
  renderTable();
}

function logout(){ localStorage.removeItem('token'); localStorage.removeItem('user'); location.href='/login'; }

async function loadCandidates() {
  const r = await fetch(`${API}/api/candidates`,{headers:{Authorization:`Bearer ${token}`}});
  allCandidates = (await r.json()).candidates || [];
}
async function loadMeetings() {
  const r = await fetch(`${API}/api/meetings`,{headers:{Authorization:`Bearer ${token}`}});
  allMeetings = (await r.json()).meetings || [];
}

function renderStats() {
  const total  = allCandidates.length;
  const done   = allCandidates.filter(c=>['locked','completed'].includes(c.interviewStatus)).length;
  const scores = allMeetings.filter(m=>m.scorecard?.overall_score).map(m=>m.scorecard.overall_score);
  const avg    = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : '—';
  const hires  = allMeetings.filter(m=>['STRONG HIRE','HIRE'].includes(m.scorecard?.recommendation)).length;
  const html = [
    {label:'Total Candidates', val:total,  col:'#7c3aed'},
    {label:'Interviews Done',  val:done,   col:'#2563eb'},
    {label:'Average Score',    val:avg,    col:'#d97706'},
    {label:'Hire Decisions',   val:hires,  col:'#16a34a'},
  ].map(s=>`
    <div style="background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;">
      <p style="margin:0;font-size:30px;font-weight:800;color:${s.col};">${s.val}</p>
      <p style="margin:4px 0 0;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;">${s.label}</p>
    </div>`).join('');
  document.getElementById('stats-row').innerHTML = html;
}

function renderTable() {
  const tbody = document.getElementById('sc-tbody');
  if (!allCandidates.length) {
    tbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:40px;">No candidates yet. <a href="/recruiter/add" style="color:var(--primary);">Add one →</a></td></tr>';
    return;
  }
  tbody.innerHTML = allCandidates.map(c => {
    const meetings = allMeetings.filter(m=>m.candidateName===c.name && m.scorecard?.overall_score)
                                .sort((a,b)=>b.scorecard.overall_score - a.scorecard.overall_score);
    const best = meetings[0];
    const overall = best?.scorecard?.overall_score;
    const col = overall?(overall>=7?'#16a34a':overall>=5?'#d97706':'#dc2626'):null;
    const scoreHtml = overall
      ? `<span class="score-chip" style="background:${col};">${overall}/10</span>`
      : '<span style="color:var(--muted);">—</span>';
    const rec = best?.scorecard?.recommendation || '—';
    const meetingBtns = meetings.length
      ? meetings.map((m,i)=>
          `<button class="btn-sm btn-outline" style="margin-right:4px;" onclick="openModal('${c.name}','${c._id}')">
            Attempt ${m.attemptNumber||i+1}
          </button>`).join('')
      : '<span style="color:var(--muted);font-size:13px;">No results yet</span>';
    return `<tr>
      <td><strong>${esc(c.name)}</strong><br><span style="font-size:12px;color:var(--muted);">${esc(c.email)}</span></td>
      <td>${esc(c.roleName||best?.roleName||'—')}</td>
      <td style="text-align:center;">${c.attemptCount||0}/2</td>
      <td>${scoreHtml}</td>
      <td style="font-size:13px;color:var(--muted);">${rec}</td>
      <td>${statusBadge(c)}</td>
      <td>${meetingBtns}</td>
    </tr>`;
  }).join('');
}

function statusBadge(c) {
  const s = c.interviewStatus||'never_invited';
  const m={never_invited:['b-gray','Not Invited'],attempt_1_scheduled:['b-blue','Interview 1 Sched.'],
    cooldown:['b-orange',coolDays(c)],attempt_2_scheduled:['b-blue','Interview 2 Sched.'],
    locked:['b-red','Final/Locked'],completed:['b-green','Completed'],partial:['b-yellow','Partial'],no_show:['b-orange','No Show']};
  const [cls,label]=m[s]||['b-gray',s];
  return `<span class="badge ${cls}">${label}</span>`;
}
function coolDays(c){
  if(!c.cooldownUntil)return'Cooldown';
  const d=Math.max(0,Math.ceil((c.cooldownUntil-Date.now())/86400000));
  return`Cooldown (${d}d)`;
}

function openModal(candidateName, candidateId) {
  document.getElementById('modal-title').textContent = candidateName;
  document.getElementById('modal-body').innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px;">Loading...</p>';
  document.getElementById('modal-tabs').innerHTML = '';
  document.getElementById('modal-overlay').classList.add('open');
  currentMeetings = allMeetings.filter(m => m.candidateName === candidateName && m.scorecard?.overall_score)
                               .sort((a,b)=>(a.attemptNumber||1)-(b.attemptNumber||1));
  if (!currentMeetings.length) {
    document.getElementById('modal-body').innerHTML='<p style="color:var(--muted);text-align:center;padding:40px;">No scorecard data yet.</p>';
    return;
  }
  if (currentMeetings.length > 1) {
    const tabs = document.getElementById('modal-tabs');
    currentMeetings.forEach((m,i) => {
      const btn = document.createElement('button');
      btn.className = `atab${i===0?' active':''}`;
      btn.textContent = `Attempt ${m.attemptNumber||i+1}`;
      btn.onclick = () => {
        document.querySelectorAll('.atab').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        renderScorecardBody(currentMeetings[i]);
      };
      tabs.appendChild(btn);
    });
  }
  renderScorecardBody(currentMeetings[0]);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function renderScorecardBody(m) {
  const sc = m.scorecard || {};
  const overall = sc.overall_score;
  if (!overall) {
    document.getElementById('modal-body').innerHTML='<p style="color:var(--muted);text-align:center;padding:40px;">No scorecard data for this attempt.</p>';
    return;
  }
  const col = overall>=7?'#16a34a':overall>=5?'#d97706':'#dc2626';
  const recCol = {STRONG_HIRE:'#16a34a',HIRE:'#2563eb',MAYBE:'#d97706',NO_HIRE:'#dc2626'}[(sc.recommendation||'').replace(' ','_')] || '#64748b';

  const dims = (sc.dimensions||[]).map(d=>{
    const dc=d.score>=7?'#16a34a':d.score>=5?'#d97706':'#dc2626';
    return`<tr>
      <td style="padding:8px 0;font-size:14px;">${esc(d.name)}</td>
      <td style="padding:8px;"><span style="background:${dc};color:#fff;padding:3px 10px;border-radius:20px;font-size:13px;font-weight:700;">${d.score}/10</span></td>
      <td style="padding:8px;font-size:13px;color:var(--muted);">${esc(d.comment||'')}</td>
    </tr>`;
  }).join('');

  const green = (sc.green_flags||[]).map(f=>`<li style="color:#166534;margin-bottom:4px;">✓ ${esc(f)}</li>`).join('');
  const red   = (sc.red_flags  ||[]).map(f=>`<li style="color:#991b1b;margin-bottom:4px;">✗ ${esc(f)}</li>`).join('');

  const skills = (sc.skill_breakdown||[]).map(s=>{
    const sc2=s.score>=7?'#16a34a':s.score>=5?'#d97706':'#dc2626';
    return`<tr>
      <td style="padding:7px 0;font-size:14px;">${esc(s.name)}</td>
      <td><span style="background:${sc2};color:#fff;padding:2px 9px;border-radius:20px;font-size:13px;font-weight:700;">${s.score}/10</span></td>
      <td style="font-size:12px;color:var(--muted);padding-left:8px;">${esc(s.description||'')}</td>
    </tr>`;
  }).join('');

  const areas = (sc.areas_for_improvement||[]).map(a=>`<li style="margin-bottom:4px;font-size:14px;">${esc(a)}</li>`).join('');

  const recBtn = m.recordingUrl
    ? `<a href="${m.recordingUrl}" target="_blank" style="display:inline-block;background:var(--primary);color:#fff;padding:9px 20px;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none;margin-top:16px;">▶ Watch Recording</a>`
    : `<p style="color:var(--muted);font-size:13px;margin-top:12px;">Recording still processing — check back soon.</p>`;

  document.getElementById('modal-body').innerHTML=`
    <div style="text-align:center;margin-bottom:24px;">
      <div style="display:inline-flex;align-items:center;justify-content:center;background:${col};color:#fff;border-radius:50%;width:84px;height:84px;font-size:34px;font-weight:800;">${overall}</div>
      <p style="margin:6px 0 0;font-size:12px;color:var(--muted);">out of 10</p>
      ${sc.recommendation?`<span style="background:${recCol};color:#fff;padding:4px 14px;border-radius:20px;font-size:13px;font-weight:700;display:inline-block;margin-top:8px;">${sc.recommendation}</span>`:''}
    </div>
    ${sc.summary?`<p style="color:#475569;line-height:1.7;margin-bottom:20px;font-style:italic;">"${esc(sc.summary)}"</p>`:''}
    ${dims?`<h4 style="font-size:14px;font-weight:700;margin-bottom:10px;">Evaluation Dimensions</h4><table style="width:100%;margin-bottom:20px;">${dims}</table>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
      ${green?`<div><h4 style="color:#166534;font-size:14px;margin-bottom:8px;">✅ Strengths</h4><ul style="margin:0;padding-left:18px;">${green}</ul></div>`:''}
      ${red  ?`<div><h4 style="color:#991b1b;font-size:14px;margin-bottom:8px;">⚠️ Areas to Improve</h4><ul style="margin:0;padding-left:18px;">${red}</ul></div>`:''}
    </div>
    ${skills?`<h4 style="font-size:14px;font-weight:700;margin-bottom:10px;">Skill Breakdown</h4><table style="width:100%;margin-bottom:20px;">${skills}</table>`:''}
    ${areas?`<h4 style="font-size:14px;font-weight:700;margin-bottom:8px;">Development Suggestions</h4><ul style="margin:0 0 20px;padding-left:18px;color:#475569;">${areas}</ul>`:''}
    <div style="text-align:center;">${recBtn}</div>
  `;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

boot();
</script>
</body>
</html>
