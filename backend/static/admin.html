<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RecruitX — Admin Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{--primary:#7c3aed;--primary-dark:#6d28d9;}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f8fafc;}
  .nav-btn{padding:8px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:#64748b;border:none;background:transparent;transition:all .2s;}
  .nav-btn.active,.nav-btn:hover{background:#f1f0ff;color:var(--primary);}
  .view{display:none;} .view.active{display:block;}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;}
  .badge-cooldown{background:#fff7ed;color:#c2410c;}
  .badge-locked{background:#fef2f2;color:#991b1b;}
  .badge-completed{background:#f0fdf4;color:#166534;}
  .badge-scheduled{background:#eff6ff;color:#1d4ed8;}
  .badge-noinvite{background:#f8fafc;color:#64748b;}
  .badge-partial{background:#fefce8;color:#854d0e;}
  .score-chip{display:inline-block;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;color:#fff;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:none;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:#fff;border-radius:16px;width:90%;max-width:700px;max-height:90vh;overflow-y:auto;padding:32px;}
  .stat-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;text-align:center;}
  input,select,textarea{border:1px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:14px;width:100%;outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--primary);}
  .btn-primary{background:var(--primary);color:#fff;border:none;padding:10px 22px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-ghost{background:#f1f5f9;color:#374151;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-ghost:hover{background:#e2e8f0;}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;padding:10px 12px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#64748b;background:#f8fafc;border-bottom:2px solid #e2e8f0;}
  td{padding:12px;font-size:14px;color:#374151;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
  tr:hover td{background:#fafafe;}
  .top-card{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border-radius:16px;padding:32px;margin-bottom:24px;}
</style>
</head>
<body>

<!-- Navbar -->
<header style="background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;">
  <div style="display:flex;align-items:center;gap:12px;">
    <img src="/static/LogoWithoutName.svg" style="height:32px;" onerror="this.style.display='none'">
    <span style="font-size:18px;font-weight:800;color:var(--primary);">RecruitX</span>
    <span style="background:#fee2e2;color:#dc2626;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;">Admin</span>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <span id="user-name" style="font-size:14px;color:#64748b;"></span>
    <button onclick="logout()" class="btn-ghost">Logout</button>
  </div>
</header>

<!-- Nav tabs -->
<div style="background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;display:flex;gap:4px;">
  <button class="nav-btn active" id="nav-weekly" onclick="showView('weekly')">Weekly Top</button>
  <button class="nav-btn" id="nav-candidates" onclick="showView('candidates')">All Candidates</button>
  <button class="nav-btn" id="nav-recruiters" onclick="showView('recruiters')">Recruiters</button>
  <button class="nav-btn" id="nav-settings" onclick="showView('settings')">Settings</button>
</div>

<main style="padding:24px;max-width:1280px;margin:0 auto;">

  <!-- ── Weekly Top Candidates ─────────────────────────────────── -->
  <div id="view-weekly" class="view active">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h2 style="font-size:20px;font-weight:800;color:#0f172a;margin:0;">Weekly Top Candidates</h2>
      <span id="week-label" style="font-size:13px;color:#64748b;"></span>
    </div>
    <div id="top-candidate-card"></div>
    <h3 style="font-size:16px;font-weight:700;color:#374151;margin:28px 0 14px;">All Candidates This Week</h3>
    <table>
      <thead><tr>
        <th>Rank</th><th>Name</th><th>Role</th><th>Recruiter</th><th>Score</th><th>Recommendation</th><th>Actions</th>
      </tr></thead>
      <tbody id="weekly-tbody"></tbody>
    </table>
  </div>

  <!-- ── All Candidates ────────────────────────────────────────── -->
  <div id="view-candidates" class="view">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h2 style="font-size:20px;font-weight:800;color:#0f172a;margin:0;">All Candidates</h2>
      <div style="display:flex;gap:8px;">
        <input id="search-q" placeholder="Search name / email..." style="width:220px;padding:8px 12px;"
               oninput="filterCandidates()">
        <select id="filter-status" onchange="filterCandidates()" style="width:160px;padding:8px 12px;">
          <option value="">All statuses</option>
          <option value="never_invited">Not Invited</option>
          <option value="attempt_1_scheduled">Interview 1 Sched.</option>
          <option value="cooldown">Cooldown</option>
          <option value="attempt_2_scheduled">Interview 2 Sched.</option>
          <option value="locked">Locked</option>
          <option value="completed">Completed</option>
        </select>
        <select id="filter-recruiter" onchange="filterCandidates()" style="width:180px;padding:8px 12px;">
          <option value="">All recruiters</option>
        </select>
      </div>
    </div>
    <table>
      <thead><tr>
        <th>Name</th><th>Email</th><th>Role</th><th>Recruiter</th><th>Attempts</th><th>Status</th><th>Score</th><th>Actions</th>
      </tr></thead>
      <tbody id="all-candidates-tbody"></tbody>
    </table>
  </div>

  <!-- ── Recruiters Overview ───────────────────────────────────── -->
  <div id="view-recruiters" class="view">
    <h2 style="font-size:20px;font-weight:800;color:#0f172a;margin-bottom:20px;">Recruiter Overview</h2>
    <div id="recruiters-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;"></div>
  </div>

  <!-- ── Settings ─────────────────────────────────────────────── -->
  <div id="view-settings" class="view">
    <h2 style="font-size:20px;font-weight:800;color:#0f172a;margin-bottom:24px;">System Settings</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:900px;">

      <!-- Google OAuth -->
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;">
        <h3 style="font-size:16px;font-weight:700;color:#374151;margin-bottom:16px;">Google Account</h3>
        <div id="google-status-msg" style="margin-bottom:12px;font-size:14px;color:#64748b;">Checking...</div>
        <button class="btn-primary" onclick="connectGoogle()">Connect Google Account</button>
      </div>

      <!-- SMTP -->
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;">
        <h3 style="font-size:16px;font-weight:700;color:#374151;margin-bottom:16px;">SMTP Email</h3>
        <form onsubmit="saveSmtp(event)">
          <div style="margin-bottom:10px;"><label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:4px;">SMTP Host</label>
            <input type="text" id="smtp-host" placeholder="smtp.gmail.com"></div>
          <div style="margin-bottom:10px;"><label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:4px;">Port</label>
            <input type="number" id="smtp-port" placeholder="587"></div>
          <div style="margin-bottom:10px;"><label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:4px;">Email Address</label>
            <input type="email" id="smtp-user" placeholder="you@gmail.com"></div>
          <div style="margin-bottom:16px;"><label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:4px;">App Password</label>
            <input type="password" id="smtp-pass" placeholder="Gmail App Password"></div>
          <div id="smtp-status" style="display:none;margin-bottom:10px;font-size:13px;padding:8px;border-radius:6px;"></div>
          <button type="submit" class="btn-primary" style="width:100%;">Save SMTP</button>
        </form>
      </div>

    </div>
  </div>

</main>

<!-- Scorecard Modal -->
<div class="modal-overlay" id="scorecard-modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal" style="max-width:740px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h3 style="font-size:18px;font-weight:800;color:#0f172a;margin:0;" id="sc-title">Scorecard</h3>
      <button onclick="document.getElementById('scorecard-modal').classList.remove('open')" style="background:none;border:none;font-size:20px;cursor:pointer;color:#64748b;">✕</button>
    </div>
    <div id="sc-body">Loading...</div>
  </div>
</div>

<script>
const API = '';
let token = localStorage.getItem('token');
let currentUser = JSON.parse(localStorage.getItem('user') || '{}');
let allCandidates = [];
let allMeetings = [];
let recruiterMap = {}; // id -> name
let filteredCandidates = [];

async function init() {
  if (!token) { window.location.href='/login'; return; }
  // Role check before hitting the server
  if (currentUser.role && currentUser.role !== 'admin') {
    window.location.href = '/recruiter';
    return;
  }
  const ok = await checkAuth();
  if (!ok) { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href='/login'; return; }
  // Re-verify role from server response
  if (currentUser.role !== 'admin') { window.location.href='/recruiter'; return; }
  document.getElementById('user-name').textContent = currentUser.name || currentUser.email || '';
  setWeekLabel();
  await Promise.all([loadCandidates(), loadMeetings(), loadSettings()]);
  buildRecruiterFilter();
  renderWeekly();
  renderAllCandidates();
  renderRecruiters();
}

async function checkAuth() {
  try {
    const r = await fetch(`${API}/api/auth/me`, {headers:{Authorization:`Bearer ${token}`}});
    if (!r.ok) return false;
    const d = await r.json();
    // Sync role from server in case localStorage is stale
    if (d.user && d.user.role) {
      currentUser.role = d.user.role;
      localStorage.setItem('user', JSON.stringify(currentUser));
    }
    return true;
  } catch { return false; }
}

function logout() {
  localStorage.removeItem('token'); localStorage.removeItem('user');
  window.location.href='/login';
}

function showView(v) {
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById(`view-${v}`).classList.add('active');
  document.getElementById(`nav-${v}`).classList.add('active');
}

function setWeekLabel() {
  const now = new Date();
  const mon = new Date(now); mon.setDate(now.getDate() - ((now.getDay()+6)%7));
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const fmt = d => d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  document.getElementById('week-label').textContent = `${fmt(mon)} – ${fmt(sun)}, ${sun.getFullYear()}`;
}

function isoWeekStart() {
  const now = new Date();
  const d = new Date(now); d.setDate(now.getDate() - ((now.getDay()+6)%7));
  d.setHours(0,0,0,0); return d.getTime();
}

async function loadCandidates() {
  try {
    const r = await fetch(`${API}/api/candidates`, {headers:{Authorization:`Bearer ${token}`}});
    const d = await r.json();
    allCandidates = d.candidates || [];
  } catch {}
}

async function loadMeetings() {
  try {
    const r = await fetch(`${API}/api/meetings`, {headers:{Authorization:`Bearer ${token}`}});
    const d = await r.json();
    allMeetings = d.meetings || [];
    // Build recruiter name map from meetings
    allMeetings.forEach(m => {
      if (m.recruiterId && m.recruiterName) recruiterMap[m.recruiterId] = m.recruiterName;
    });
  } catch {}
}

function buildRecruiterFilter() {
  const sel = document.getElementById('filter-recruiter');
  const seen = new Set();
  allCandidates.forEach(c => {
    if (c.recruiterId && !seen.has(c.recruiterId)) {
      seen.add(c.recruiterId);
      const o = document.createElement('option');
      o.value = c.recruiterId;
      o.textContent = recruiterMap[c.recruiterId] || `Recruiter (${c.recruiterId.slice(-6)})`;
      sel.appendChild(o);
    }
  });
}

// ── Weekly Top ─────────────────────────────────────────────────

function renderWeekly() {
  const weekStart = isoWeekStart();
  const weeklyMeetings = allMeetings.filter(m =>
    m.createdAt >= weekStart && m.interviewStatus === 'completed' && m.scorecard && m.scorecard.overall_score
  ).sort((a,b) => (b.scorecard.overall_score||0) - (a.scorecard.overall_score||0));

  if (!weeklyMeetings.length) {
    document.getElementById('top-candidate-card').innerHTML =
      '<p style="color:#94a3b8;text-align:center;padding:40px;background:#fff;border-radius:12px;border:1px dashed #e2e8f0;">No completed interviews this week yet.</p>';
    document.getElementById('weekly-tbody').innerHTML =
      '<tr><td colspan="7" style="text-align:center;color:#94a3b8;padding:40px;">No data</td></tr>';
    return;
  }

  const top = weeklyMeetings[0];
  const sc = top.scorecard;
  const recColor = sc.recommendation==='STRONG HIRE'?'#86efac':sc.recommendation==='HIRE'?'#93c5fd':'#fcd34d';
  document.getElementById('top-candidate-card').innerHTML = `
    <div class="top-card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;">
        <div>
          <p style="margin:0 0 4px;font-size:13px;opacity:.8;text-transform:uppercase;letter-spacing:.08em;">🏆 Top Candidate This Week</p>
          <h2 style="margin:0 0 8px;font-size:28px;font-weight:800;">${top.candidateName}</h2>
          <p style="margin:0;font-size:15px;opacity:.85;">${top.roleName||'Interview'}</p>
          ${sc.recommendation?`<span style="background:${recColor};color:#1e293b;padding:4px 14px;border-radius:20px;font-size:13px;font-weight:700;display:inline-block;margin-top:8px;">${sc.recommendation}</span>`:''}
        </div>
        <div style="text-align:center;">
          <div style="width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:800;">${sc.overall_score}</div>
          <p style="margin:6px 0 0;font-size:12px;opacity:.7;">out of 10</p>
        </div>
      </div>
      ${sc.summary?`<p style="margin:16px 0 0;opacity:.85;font-style:italic;line-height:1.6;">"${sc.summary}"</p>`:''}
    </div>
  `;

  document.getElementById('weekly-tbody').innerHTML = weeklyMeetings.map((m,i) => {
    const s = m.scorecard.overall_score;
    const col = s>=7?'#16a34a':s>=5?'#d97706':'#dc2626';
    const recruiterName = m.recruiterId ? (recruiterMap[m.recruiterId] || m.recruiterId.slice(-6)) : '—';
    return `<tr>
      <td style="font-weight:700;color:#7c3aed;">#${i+1}</td>
      <td><strong>${m.candidateName}</strong></td>
      <td>${m.roleName||'—'}</td>
      <td style="color:#64748b;">${recruiterName}</td>
      <td><span class="score-chip" style="background:${col};">${s}/10</span></td>
      <td>${m.scorecard.recommendation||'—'}</td>
      <td><button class="btn-ghost" style="font-size:12px;padding:5px 10px;" onclick="openMeetingScorecard('${m._id}','${m.candidateName}')">View</button></td>
    </tr>`;
  }).join('');
}

// ── All Candidates ──────────────────────────────────────────────

function renderAllCandidates() {
  filteredCandidates = [...allCandidates];
  refreshCandidatesTable();
}

function filterCandidates() {
  const q = document.getElementById('search-q').value.toLowerCase();
  const status = document.getElementById('filter-status').value;
  const rid = document.getElementById('filter-recruiter').value;
  filteredCandidates = allCandidates.filter(c => {
    if (q && !(c.name||'').toLowerCase().includes(q) && !(c.email||'').toLowerCase().includes(q)) return false;
    if (status && (c.interviewStatus||'never_invited') !== status) return false;
    if (rid && c.recruiterId !== rid) return false;
    return true;
  });
  refreshCandidatesTable();
}

function refreshCandidatesTable() {
  const tbody = document.getElementById('all-candidates-tbody');
  if (!filteredCandidates.length) {
    tbody.innerHTML='<tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:40px;">No candidates match the filter</td></tr>';
    return;
  }
  tbody.innerHTML = filteredCandidates.map(c => {
    const s = c.interviewStatus || 'never_invited';
    const statusMap = {
      'never_invited':['badge-noinvite','Not Invited'],
      'attempt_1_scheduled':['badge-scheduled','Interview 1 Sched.'],
      'cooldown':['badge-cooldown','Cooldown'],
      'attempt_2_scheduled':['badge-scheduled','Interview 2 Sched.'],
      'locked':['badge-locked','Final'],
      'completed':['badge-completed','Completed'],
      'partial':['badge-partial','Partial'],
      'no_show':['badge-cooldown','No Show'],
    };
    const [cls, label] = statusMap[s] || ['badge-noinvite', s];
    const recruiterName = c.recruiterId ? (recruiterMap[c.recruiterId] || c.recruiterId.slice(-6)) : '—';
    // Find best score from meetings
    const cMeetings = allMeetings.filter(m => m.candidateName === c.name && m.scorecard && m.scorecard.overall_score);
    const bestScore = cMeetings.length ? Math.max(...cMeetings.map(m => m.scorecard.overall_score)) : null;
    const scoreHtml = bestScore
      ? `<span class="score-chip" style="background:${bestScore>=7?'#16a34a':bestScore>=5?'#d97706':'#dc2626'};">${bestScore}/10</span>`
      : '<span style="color:#94a3b8;">—</span>';
    return `<tr>
      <td><strong>${c.name}</strong></td>
      <td style="color:#64748b;font-size:13px;">${c.email}</td>
      <td>${c.roleName||'—'}</td>
      <td style="color:#64748b;">${recruiterName}</td>
      <td style="text-align:center;">${c.attemptCount||0}/2</td>
      <td><span class="badge ${cls}">${label}</span></td>
      <td>${scoreHtml}</td>
      <td>${cMeetings.length?`<button class="btn-ghost" style="font-size:12px;padding:5px 10px;" onclick="openMeetingScorecard('${cMeetings[0]._id}','${c.name}')">Scorecard</button>`:'—'}</td>
    </tr>`;
  }).join('');
}

// ── Recruiters ──────────────────────────────────────────────────

function renderRecruiters() {
  const stats = {};
  allCandidates.forEach(c => {
    const rid = c.recruiterId || '__none__';
    if (!stats[rid]) stats[rid] = { count: 0, completed: 0, scores: [] };
    stats[rid].count++;
    if (['completed','locked'].includes(c.interviewStatus)) stats[rid].completed++;
  });
  allMeetings.forEach(m => {
    const rid = m.recruiterId || '__none__';
    if (m.scorecard && m.scorecard.overall_score) {
      if (!stats[rid]) stats[rid] = { count: 0, completed: 0, scores: [] };
      stats[rid].scores.push(m.scorecard.overall_score);
    }
  });

  const grid = document.getElementById('recruiters-grid');
  const rids = Object.keys(stats).filter(r => r !== '__none__');
  if (!rids.length) {
    grid.innerHTML='<p style="color:#94a3b8;">No recruiter data yet.</p>';
    return;
  }
  grid.innerHTML = rids.map(rid => {
    const st = stats[rid];
    const avg = st.scores.length ? (st.scores.reduce((a,b)=>a+b,0)/st.scores.length).toFixed(1) : '—';
    const name = recruiterMap[rid] || `Recruiter (${rid.slice(-6)})`;
    return `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <div style="width:40px;height:40px;border-radius:50%;background:#ede9fe;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--primary);">
          ${name.charAt(0).toUpperCase()}
        </div>
        <div>
          <p style="margin:0;font-weight:700;color:#0f172a;">${name}</p>
          <p style="margin:0;font-size:12px;color:#94a3b8;">${rid.slice(-12)}</p>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center;">
        <div><p style="margin:0;font-size:22px;font-weight:800;color:var(--primary);">${st.count}</p><p style="margin:0;font-size:11px;color:#94a3b8;text-transform:uppercase;">Candidates</p></div>
        <div><p style="margin:0;font-size:22px;font-weight:800;color:#16a34a;">${st.completed}</p><p style="margin:0;font-size:11px;color:#94a3b8;text-transform:uppercase;">Completed</p></div>
        <div><p style="margin:0;font-size:22px;font-weight:800;color:#d97706;">${avg}</p><p style="margin:0;font-size:11px;color:#94a3b8;text-transform:uppercase;">Avg Score</p></div>
      </div>
    </div>`;
  }).join('');
}

// ── Settings ────────────────────────────────────────────────────

async function loadSettings() {
  try {
    const [gRes, smtpRes] = await Promise.all([
      fetch(`${API}/api/auth/google/status`, {headers:{Authorization:`Bearer ${token}`}}),
      fetch(`${API}/api/settings/smtp`, {headers:{Authorization:`Bearer ${token}`}}),
    ]);
    const g = await gRes.json();
    document.getElementById('google-status-msg').innerHTML = g.connected
      ? '<span style="color:#16a34a;font-weight:700;">✓ Connected</span>'
      : '<span style="color:#dc2626;">✗ Not connected</span>';

    const smtp = await smtpRes.json();
    if (smtp.configured) {
      document.getElementById('smtp-host').value = smtp.host || 'smtp.gmail.com';
      document.getElementById('smtp-port').value = smtp.port || 587;
      document.getElementById('smtp-user').value = smtp.user || '';
    }
  } catch {}
}

async function connectGoogle() {
  try {
    const r = await fetch(`${API}/api/auth/google`, {headers:{Authorization:`Bearer ${token}`}});
    const d = await r.json();
    if (d.auth_url) window.location.href = d.auth_url;
    else alert(d.detail || 'Failed to get auth URL');
  } catch(e) { alert('Error: ' + e.message); }
}

async function saveSmtp(e) {
  e.preventDefault();
  const statusEl = document.getElementById('smtp-status');
  const body = {
    host: document.getElementById('smtp-host').value.trim() || 'smtp.gmail.com',
    port: parseInt(document.getElementById('smtp-port').value) || 587,
    user: document.getElementById('smtp-user').value.trim(),
    password: document.getElementById('smtp-pass').value,
  };
  try {
    const r = await fetch(`${API}/api/settings/smtp`, {
      method:'POST', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Save failed');
    statusEl.style.cssText='display:block;background:#f0fdf4;color:#166534;padding:8px;border-radius:6px;';
    statusEl.textContent='SMTP settings saved!';
  } catch(err) {
    statusEl.style.cssText='display:block;background:#fef2f2;color:#dc2626;padding:8px;border-radius:6px;';
    statusEl.textContent=err.message;
  }
}

// ── Scorecard viewer ───────────────────────────────────────────

async function openMeetingScorecard(meetingId, candidateName) {
  document.getElementById('sc-title').textContent = `Scorecard — ${candidateName}`;
  document.getElementById('sc-body').innerHTML = '<p style="color:#94a3b8;text-align:center;padding:40px;">Loading...</p>';
  document.getElementById('scorecard-modal').classList.add('open');

  try {
    const r = await fetch(`${API}/api/meetings/${meetingId}`, {headers:{Authorization:`Bearer ${token}`}});
    const d = await r.json();
    const m = d.meeting;
    if (!m || !m.scorecard) {
      document.getElementById('sc-body').innerHTML = '<p style="color:#94a3b8;text-align:center;padding:40px;">No scorecard available.</p>';
      return;
    }
    const sc = m.scorecard;
    const overall = sc.overall_score || '—';
    const scoreColor = typeof overall==='number'?(overall>=7?'#16a34a':overall>=5?'#d97706':'#dc2626'):'#64748b';
    const recColor = sc.recommendation==='STRONG HIRE'?'#16a34a':sc.recommendation==='HIRE'?'#2563eb':sc.recommendation==='MAYBE'?'#d97706':'#dc2626';
    const dims = (sc.dimensions||[]).map(d =>
      `<tr><td style="padding:8px 0;font-size:14px;">${d.name}</td>
       <td style="padding:8px;"><span style="background:${d.score>=7?'#16a34a':d.score>=5?'#d97706':'#dc2626'};color:#fff;padding:3px 10px;border-radius:20px;font-size:13px;font-weight:700;">${d.score}/10</span></td>
       <td style="padding:8px;font-size:13px;color:#64748b;">${d.comment||''}</td></tr>`
    ).join('');
    const greenFlags = (sc.green_flags||[]).map(f=>`<li style="color:#166534;margin-bottom:4px;">✓ ${f}</li>`).join('');
    const redFlags = (sc.red_flags||[]).map(f=>`<li style="color:#991b1b;margin-bottom:4px;">✗ ${f}</li>`).join('');
    const recordingBtn = m.recordingUrl
      ? `<a href="${m.recordingUrl}" target="_blank" style="display:inline-block;background:#7c3aed;color:#fff;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;">▶ Watch Recording</a>`
      : '<p style="color:#94a3b8;font-size:13px;">Recording processing...</p>';

    document.getElementById('sc-body').innerHTML = `
      <div style="text-align:center;margin-bottom:24px;">
        <div style="display:inline-block;background:${scoreColor};color:#fff;border-radius:50%;width:80px;height:80px;line-height:80px;font-size:32px;font-weight:800;">${overall}</div>
        <p style="margin:6px 0 0;font-size:12px;color:#64748b;">out of 10</p>
        ${sc.recommendation?`<span style="background:${recColor};color:#fff;padding:4px 14px;border-radius:20px;font-size:13px;font-weight:700;display:inline-block;margin-top:6px;">${sc.recommendation}</span>`:''}
      </div>
      ${sc.summary?`<p style="color:#475569;line-height:1.7;margin-bottom:20px;font-style:italic;">"${sc.summary}"</p>`:''}
      ${dims?`<table style="width:100%;margin-bottom:20px;">${dims}</table>`:''}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
        ${greenFlags?`<div><h4 style="color:#166534;font-size:14px;margin-bottom:8px;">Strengths</h4><ul style="margin:0;padding-left:18px;">${greenFlags}</ul></div>`:''}
        ${redFlags?`<div><h4 style="color:#991b1b;font-size:14px;margin-bottom:8px;">Areas to Improve</h4><ul style="margin:0;padding-left:18px;">${redFlags}</ul></div>`:''}
      </div>
      <div style="text-align:center;">${recordingBtn}</div>
    `;
  } catch(e) {
    document.getElementById('sc-body').innerHTML = `<p style="color:#dc2626;padding:20px;">Error: ${e.message}</p>`;
  }
}

init();
