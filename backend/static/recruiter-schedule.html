<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Schedule Interview — RecruitX</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{--primary:#7c3aed;--primary-dark:#6d28d9;--border:#e2e8f0;--muted:#64748b;--bg:#f8fafc;}
  *{box-sizing:border-box;}
  body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);margin:0;display:flex;min-height:100vh;}
  .sidebar{width:220px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;position:fixed;top:0;left:0;height:100vh;z-index:10;}
  .sidebar-logo{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px;}
  .sidebar-logo span{font-size:20px;font-weight:800;color:var(--primary);}
  .sidebar-role{display:inline-block;background:#ede9fe;color:var(--primary);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:4px;}
  .nav-link{display:flex;align-items:center;gap:10px;padding:11px 20px;font-size:14px;font-weight:600;color:var(--muted);text-decoration:none;border-left:3px solid transparent;transition:all .15s;}
  .nav-link:hover{background:#f5f3ff;color:var(--primary);}
  .nav-link.active{background:#f5f3ff;color:var(--primary);border-left-color:var(--primary);}
  .nav-icon{width:18px;text-align:center;}
  .sidebar-bottom{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);}
  .main{margin-left:220px;padding:32px;flex:1;}
  .card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:28px;}
  label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:5px;}
  input,select,textarea{width:100%;padding:10px 13px;font-size:14px;border:1px solid var(--border);border-radius:8px;outline:none;transition:border .15s;background:#fff;}
  input:focus,select:focus,textarea:focus{border-color:var(--primary);}
  .form-row{margin-bottom:16px;}
  .btn{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:background .15s;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-primary:disabled{background:#c4b5fd;cursor:not-allowed;}
  .btn-danger{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;padding:6px 13px;font-size:13px;border-radius:6px;cursor:pointer;}
  .alert{padding:11px 14px;border-radius:8px;font-size:14px;margin-bottom:14px;display:none;}
  .alert.show{display:block;}
  .alert.success{background:#f0fdf4;color:#16a34a;}
  .alert.error{background:#fef2f2;color:#dc2626;}
  .alert.info{background:#eff6ff;color:#1d4ed8;}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;padding:10px 13px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);background:var(--bg);border-bottom:2px solid var(--border);}
  td{padding:13px;font-size:14px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
  tr:hover td{background:#fafafe;}
  .badge{display:inline-block;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:700;}
  .b-blue{background:#eff6ff;color:#1d4ed8;}
  .b-green{background:#f0fdf4;color:#16a34a;}
  .b-gray{background:#f1f5f9;color:var(--muted);}
  .b-red{background:#fef2f2;color:#dc2626;}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div><span>RecruitX</span></div>
    <div class="sidebar-role">Recruiter</div>
  </div>
  <a href="/recruiter/add"        class="nav-link"><span class="nav-icon">👤</span> Add Candidate</a>
  <a href="/recruiter/schedule"   class="nav-link active"><span class="nav-icon">📅</span> Schedule Interview</a>
  <a href="/recruiter/scorecards" class="nav-link"><span class="nav-icon">📊</span> Scorecards</a>
  <a href="/recruiter/prompts"    class="nav-link"><span class="nav-icon">✨</span> Generate Prompt</a>
  <div class="sidebar-bottom">
    <div style="font-size:13px;font-weight:600;color:#374151;" id="user-name"></div>
    <div style="font-size:11px;color:var(--muted);" id="user-email"></div>
    <button onclick="logout()" style="margin-top:10px;background:#f1f5f9;border:none;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;width:100%;">Logout</button>
  </div>
</aside>

<div class="main">
  <h1 style="font-size:22px;font-weight:800;color:#0f172a;margin:0 0 24px;">Schedule Interview</h1>

  <div style="display:grid;grid-template-columns:500px 1fr;gap:24px;align-items:start;">

    <!-- Schedule form -->
    <div class="card">
      <h2 style="font-size:16px;font-weight:700;color:#374151;margin:0 0 20px;">New Interview</h2>
      <form id="sch-form" onsubmit="submitSchedule(event)">

        <div class="form-row">
          <label>Candidate *</label>
          <select id="f-candidate" required>
            <option value="">Loading candidates...</option>
          </select>
          <p id="note-all" style="font-size:12px;color:var(--muted);margin:4px 0 0;display:none;">
            Only candidates not yet scheduled or locked are shown.
          </p>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-row">
            <label>Date &amp; Time *</label>
            <input type="datetime-local" id="f-datetime" required>
          </div>
          <div class="form-row">
            <label>Duration</label>
            <select id="f-duration">
              <option value="20">20 minutes</option>
              <option value="30" selected>30 minutes</option>
              <option value="45">45 minutes</option>
              <option value="60">60 minutes</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <label>Role / Position *</label>
          <input type="text" id="f-role" placeholder="e.g. Full Stack Developer" required>
        </div>

        <div class="form-row">
          <label>System Prompt</label>
          <select id="f-prompt-pick" onchange="fillPrompt()" style="margin-bottom:8px;">
            <option value="">— Choose a saved prompt or write custom —</option>
          </select>
          <textarea id="f-prompt" rows="5" placeholder="AI interviewer instructions..."></textarea>
          <p style="font-size:12px;color:var(--muted);margin:4px 0 0;">
            <a href="/recruiter/prompts" style="color:var(--primary);">Generate a new prompt →</a>
          </p>
        </div>

        <div id="sch-alert" class="alert"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="sch-btn">
          Schedule &amp; Send Invite
        </button>
      </form>
    </div>

    <!-- Scheduled list -->
    <div class="card">
      <h2 style="font-size:16px;font-weight:700;color:#374151;margin:0 0 16px;">Scheduled Interviews</h2>
      <table>
        <thead><tr>
          <th>Candidate</th><th>Role</th><th>Date &amp; Time</th><th>Attempt</th><th>Status</th><th></th>
        </tr></thead>
        <tbody id="sch-tbody">
          <tr><td colspan="6" style="text-align:center;color:var(--muted);padding:32px;">Loading...</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<script>
const API = '';
const token = localStorage.getItem('token') || '';
const user  = JSON.parse(localStorage.getItem('user') || '{}');
let allCandidates = [];

async function boot() {
  if (!token) { location.href='/login'; return; }
  if (user.role === 'admin') { location.href='/admin'; return; }
  try {
    const r = await fetch(`${API}/api/auth/me`,{headers:{Authorization:`Bearer ${token}`}});
    if (!r.ok) { logout(); return; }
    const d = await r.json();
    if (d.user?.role === 'admin') { location.href='/admin'; return; }
  } catch { logout(); return; }
  document.getElementById('user-name').textContent  = user.name  || '';
  document.getElementById('user-email').textContent = user.email || '';
  await Promise.all([loadCandidates(), loadPrompts(), loadScheduled()]);
  // Auto-fill prompt if coming from Generate Prompt page
  const pending = sessionStorage.getItem('pendingPrompt');
  if (pending) { document.getElementById('f-prompt').value = pending; sessionStorage.removeItem('pendingPrompt'); }
}

function logout() { localStorage.removeItem('token'); localStorage.removeItem('user'); location.href='/login'; }

async function loadCandidates() {
  const r = await fetch(`${API}/api/candidates`,{headers:{Authorization:`Bearer ${token}`}});
  const d = await r.json();
  allCandidates = d.candidates || [];
  const schedulable = allCandidates.filter(c => !c.interviewStatus || c.interviewStatus === 'never_invited');
  const sel = document.getElementById('f-candidate');
  sel.innerHTML = '<option value="">Select a candidate...</option>';
  schedulable.forEach(c => {
    const o = document.createElement('option');
    o.value = c._id; o.textContent = `${c.name} (${c.email})`;
    sel.appendChild(o);
  });
  if (schedulable.length < allCandidates.length) document.getElementById('note-all').style.display='block';
}

async function loadPrompts() {
  const r = await fetch(`${API}/api/prompts`,{headers:{Authorization:`Bearer ${token}`}});
  const d = await r.json();
  const sel = document.getElementById('f-prompt-pick');
  (d.prompts||[]).forEach(p => {
    const o = document.createElement('option');
    o.value = p.promptText; o.textContent = p.roleName;
    sel.appendChild(o);
  });
}

function fillPrompt() {
  const v = document.getElementById('f-prompt-pick').value;
  if (v) document.getElementById('f-prompt').value = v;
}

async function submitSchedule(e) {
  e.preventDefault();
  const btn = document.getElementById('sch-btn');
  btn.disabled = true;
  alert2('sch-alert','info','Creating Google Meet and sending invite...');
  try {
    const dt = document.getElementById('f-datetime').value;
    const r = await fetch(`${API}/api/interviews/schedule`,{
      method:'POST',
      headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
      body: JSON.stringify({
        candidate_id:     document.getElementById('f-candidate').value,
        scheduled_at_iso: new Date(dt).toISOString(),
        duration_minutes: parseInt(document.getElementById('f-duration').value),
        role_name:        document.getElementById('f-role').value.trim()||'Interview',
        system_prompt:    document.getElementById('f-prompt').value.trim(),
        platform:         'google_meet',
      })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail||'Failed');
    alert2('sch-alert','success',`Scheduled! Email sent: ${d.email_sent?'Yes ✓':'No — check SMTP settings'}`);
    e.target.reset();
    await Promise.all([loadCandidates(), loadScheduled()]);
  } catch(err) { alert2('sch-alert','error',err.message); }
  finally { btn.disabled=false; }
}

async function loadScheduled() {
  const tbody = document.getElementById('sch-tbody');
  try {
    const r = await fetch(`${API}/api/interviews/scheduled`,{headers:{Authorization:`Bearer ${token}`}});
    const d = await r.json();
    const rows = d.interviews||[];
    if (!rows.length) {
      tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:32px;">No interviews scheduled yet.</td></tr>';
      return;
    }
    const statusCls = {pending:'b-blue',active:'b-green',completed:'b-gray',cancelled:'b-red'};
    tbody.innerHTML = rows.map(iv=>`
      <tr>
        <td><strong>${esc(iv.candidateName)}</strong></td>
        <td>${esc(iv.roleName)}</td>
        <td style="font-size:13px;color:var(--muted);">${new Date(iv.scheduledAt).toLocaleString()}</td>
        <td style="text-align:center;">#${iv.attemptNumber||1}</td>
        <td><span class="badge ${statusCls[iv.status]||'b-gray'}">${iv.status}</span></td>
        <td>${iv.status==='pending'?`<button class="btn-danger" onclick="cancel('${iv._id}')">Cancel</button>`:'—'}</td>
      </tr>`).join('');
  } catch { tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--muted);">Failed to load</td></tr>'; }
}

async function cancel(id) {
  if (!confirm('Cancel this interview?')) return;
  await fetch(`${API}/api/interviews/${id}/cancel`,{method:'POST',headers:{Authorization:`Bearer ${token}`}});
  loadScheduled();
}

function alert2(id,type,msg){const el=document.getElementById(id);el.textContent=msg;el.className=`alert show ${type}`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

boot();
</script>
</body>
</html>
