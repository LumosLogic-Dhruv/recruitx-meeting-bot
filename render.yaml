services:
  - type: web
    name: lumos-interview-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RECALL_API_KEY
        sync: false
      - key: RECALL_API_URL
        value: https://ap-northeast-1.recall.ai/api/v1
      - key: OPENAI_API_KEY
        sync: false
      - key: RENDER_URL
        sync: false
